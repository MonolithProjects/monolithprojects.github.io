section:
  name: Skills
  id: skills
  enable: true
  weight: 2
  showOnNavbar: true
  # Can optionally hide the title in sections
  # hideTitle: true

skills:
  - name: Kubernetes
    logo: "/images/sections/skills/kubernetes.png"
    summary: "Building, operating and troubleshooting Kubernetes clusters at scale - Kubespray and RKE2 on bare metal. Comfortable with Helm, Kustomize, custom operators, and the messy bits underneath."
    url: "https://kubernetes.io/"

  - name: Cluster API & Metal3
    logo: "/images/sections/skills/kubernetes.png"
    summary: "Building a next-gen bare-metal cloud - declarative cluster lifecycle with CAPI, hardware provisioning with Metal3 and Ironic, managed via Rancher."
    url: "https://cluster-api.sigs.k8s.io/"

  - name: Ansible
    logo: "/images/sections/skills/ansible.png"
    summary: "Automating Linux server configuration and software lifecycle. Maintainer of two community Ansible roles with 1M+ Galaxy downloads and 800+ GitHub stars."
    url: "https://ansible.com/"

  - name: GitOps & CI/CD
    logo: /images/sections/skills/cicd.png
    summary: "Argo CD for continuous delivery, GitHub Actions and GitLab CI for the build side. Strong preference for GitOps over imperative pipelines whenever the use case allows."

  - name: Observability
    logo: /images/sections/skills/prometheus.png
    summary: "Prometheus, Thanos, Loki, Grafana, Graylog, OpenSearch - running the whole stack. Comfortable in PromQL and Alertmanager."
    url: "https://prometheus.io/"

  - name: Linux servers
    logo: "/images/sections/skills/linux.png"
    summary: "10+ years managing Linux servers - RHEL, Rocky, Ubuntu - across telco and research environments. Moving from configuration management toward immutable, image-based hosts."

  - name: Cloud (public & private)
    logo: "/images/sections/skills/cloud.png"
    summary: "Worked with the major public clouds, AWS most. Several years on a private OpenStack cloud. Currently focused on bare-metal as a third option."

  - name: Bash & Python
    logo: "/images/sections/skills/python.png"
    summary: "Bash for the everyday glue, Python when the glue gets too sticky."

  - name: Git
    logo: /images/sections/skills/git.png
    summary: "Git-based development across GitHub and GitLab. Branching strategies, rebasing, conflict resolution - the daily grammar."
    url: "https://git-scm.com/"
