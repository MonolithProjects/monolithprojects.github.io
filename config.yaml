baseURL: https://monolithprojects.github.io
languageCode: en-us
title: "Satellite"

# Use Hugo modules to add theme (replaces theme: "toha")
module:
  imports:
    - path: github.com/hugo-toha/toha/v4
  mounts:
    - source: static/files
      target: static/files
    - source: ./node_modules/flag-icons/flags
      target: static/flags
    - source: ./node_modules/@fontsource/mulish/files
      target: static/files
    - source: ./node_modules/katex/dist/fonts
      target: static/fonts

# Manage languages
languages:
  en:
    languageCode: en
    languageName: English
    title: "Satellite"
    weight: 1

defaultContentLanguage: en

# Allow raw html in markdown file
markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

# At least HTML and JSON are required for the main HTML content and
# client-side JavaScript search
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Enable global emoji support
enableEmoji: true

# Site parameters
params:
  # Background image of the landing page
  background: /images/site/background.jpg

  # Provide logos for your site
  logo:
    main: /images/site/main-logo.png
    inverted: /images/site/invert-logo.png
    favicon: /images/site/favicon.png

  # GitHub repo of your site
  gitRepo: https://github.com/monolithprojects/monolithprojects.github.io
  # Default branch of your Git repo
  gitBranch: source

  # Configure the number of section title visible in the top navbar
  topNavbar:
    maxVisibleSections: 5

  # Configure various features of this theme
  features:
    # Configure theme color settings
    theme:
      enable: true
      services:
        light: true
        dark: true
        default: system

    # Enable and configure portfolio
    portfolio:
      enable: true

    # Enable and configure blog posts
    blog:
      enable: true
      showAuthor: true
      # Share post on different social media
      shareButtons:
        facebook: true
        twitter: true
        linkedin: true
        reddit: true
        whatsapp: true
        email: true

    # Enable & configure "Notes" features
    notes:
      enable: true

    # Enable comment feature
    comment:
      enable: false
      services:
        disqus:
          shortName: toha-example-site

    # Enable Analytics (optional - remove if not needed)
    analytics:
      enable: false

    # Enable Support (optional - remove if not needed)
    support:
      enable: false

    # Table of Contents
    toc:
      enable: true

    # Show tags under the post title
    tags:
      enable: true
      on_card: true

    # Show flags in language selector
    flags:
      enable: true

    # Enable this to use `embed-pdf` shortcode
    embedpdf:
      enable: true

    # Enable flowcharts using shortcodes
    flowchart:
      enable: true
      services:
        mermaid:
          theme: forest

    # Enable mathematic expressions
    math:
      enable: true
      services:
        katex:
          delimiters:
            - left: $$
              right: $$
              display: true
            - left: $
              right: $
              display: false

    # Custom syntax highlighting
    syntaxHighlight:
      enable: true
      services:
        hljs:
          noHighlightRe: /^no-highlight$/i

    # Enable video player shortcode
    videoPlayer:
      enable: true
      services:
        plyr: {}

    # Enables copy code button
    copyCodeButton:
      enable: true

    # Enable reading time
    readingTime:
      enable: false

    # Pagination
    pagination:
      maxPostsPerPage: 12

  # Footer configuration
  footer:
    enable: true
    template: footer.html
    navigation:
      enable: true
      customMenus: true
    contactMe:
      enable: true
    credentials:
      enable: true
    newsletter:
      enable: false
    disclaimer:
      enable: false
