jobs:
  deploy:
    runs-on: ubuntu-24.04          # 22.04 still works, but 24.04 is current
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Go            # required for Hugo Modules
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node          # required by Hugo 0.161 for PostCSS/Tailwind permissions
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4   # v3 → v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: main
          publish_dir: ./public
          cname: satellite.sk
